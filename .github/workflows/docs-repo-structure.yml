name: Docs Repository Structure Drift

on:
  pull_request:
    paths:
      - 'README.md'
      - 'docs/**'
      - 'apps/**'
      - 'packages/**'
      - 'contracts/**'
      - 'services/**'
      - 'scripts/check-docs-repo-structure.mjs'
      - 'package.json'
      - '.github/workflows/docs-repo-structure.yml'

permissions:
  contents: read

jobs:
  check-docs-repo-structure:
    name: Check documented repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check repository structure docs
        run: node scripts/check-docs-repo-structure.mjs
