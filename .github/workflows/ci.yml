name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  quarantine-registry:
    name: Flaky Test Quarantine Registry
    runs-on: ubuntu-latest
    outputs:
      active_count: ${{ steps.validate.outputs.active_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate quarantine registry
        id: validate
        run: node scripts/ci/flaky-quarantine.js validate

      - name: Publish quarantine report
        run: node scripts/ci/flaky-quarantine.js report

      - name: Auto-tag PR with active quarantine labels
        if: github.event_name == 'pull_request' && steps.validate.outputs.active_count != '0'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('.github/flaky-test-quarantine.json', 'utf8'));
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: registry.labels
            });

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: quarantine-registry
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Lint indexer migrations
        run: pnpm indexer:lint-migrations

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quarantine-registry
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Check coverage gates
        run: node scripts/coverage-gate.js
        continue-on-error: false

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: packages/*/coverage/
          retention-days: 30

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test
        continue-on-error: true

      - name: Generate coverage summary
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for package in core-sdk account-abstraction crypto stellar; do
            if [ -f "packages/$package/coverage/coverage-summary.json" ]; then
              echo "### $package" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              node -e "
                const data = require('./packages/$package/coverage/coverage-summary.json');
                const total = data.total;
                console.log('Branch:    ' + total.branches.pct + '%');
                console.log('Functions: ' + total.functions.pct + '%');
                console.log('Lines:     ' + total.lines.pct + '%');
                console.log('Statements: ' + total.statements.pct + '%');
              " >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done

  extension-e2e-smoke:
    name: Extension E2E Smoke
    runs-on: ubuntu-latest
    needs: quarantine-registry
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser dependencies
        run: pnpm --filter @ancore/extension-wallet exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run extension smoke suite
        id: smoke
        run: node scripts/ci/flaky-quarantine.js run --area extension-wallet -- pnpm --filter @ancore/extension-wallet exec playwright test --config=tests/playwright.config.ts --grep @smoke --project=${{ matrix.browser }}

      - name: Auto-tag PR when quarantine absorbs a smoke failure
        if: github.event_name == 'pull_request' && steps.smoke.outputs.quarantined == 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('.github/flaky-test-quarantine.json', 'utf8'));
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: registry.labels
            });

      - name: Upload flaky quarantine report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-quarantine-report-${{ matrix.browser }}
          path: .ci/flaky-quarantine-report.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload extension E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-e2e-failure-artifacts-${{ matrix.browser }}
          path: apps/extension-wallet/test-results/
          retention-days: 7

  contracts:
    name: Build & Test Contracts
    runs-on: ubuntu-latest
    needs: quarantine-registry
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.81.0

      - name: Ensure Cargo cache directories exist
        run: |
          mkdir -p $HOME/.cargo/bin
          mkdir -p $HOME/.cargo/registry/index
          mkdir -p $HOME/.cargo/registry/cache
          mkdir -p $HOME/.cargo/git/db
          mkdir -p ${{ github.workspace }}/contracts/target

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ${{ github.workspace }}/contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: |
          mkdir -p ~/.local/bin
          curl -L https://github.com/stellar/stellar-cli/releases/download/v22.0.1/stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz | tar xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          stellar version

      - name: Build contracts
        working-directory: ./contracts
        run: stellar contract build

      - name: Check Rust formatting
        working-directory: ./contracts
        run: cargo fmt --check

      - name: Run clippy
        working-directory: ./contracts
        run: cargo clippy -- -D warnings

      - name: Test contracts
        working-directory: ./contracts
        run: cargo test

      - name: Check WASM Size Regression
        run: node scripts/check-wasm-size.js

      - name: Upload WASM size reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-reports
          path: |
            wasm-size-report.json
            wasm-size-report.md
          retention-days: 30

      - name: Upload contract build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-failure-logs
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    needs: quarantine-registry
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'indexer') ||
      startsWith(github.head_ref, 'feat/') ||
      startsWith(github.head_ref, 'fix/') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ${{ github.workspace }}/services/indexer/target
          key: ${{ runner.os }}-indexer-cargo-${{ hashFiles('services/indexer/Cargo.lock', 'services/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-indexer-cargo-

      - name: Check formatting
        working-directory: ./services/indexer
        run: cargo fmt --check

      - name: Run clippy
        working-directory: ./services/indexer
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ./services/indexer
        run: cargo test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quarantine-registry
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  # ── Issue #660: Relayer log-redaction CI guard ────────────────────────────
  relayer-security:
    name: Relayer — Log Redaction Check
    runs-on: ubuntu-latest
    needs: quarantine-registry
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'services/relayer') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install relayer dependencies
        run: pnpm install --frozen-lockfile
        working-directory: services/relayer

      - name: Run log-redaction grep check
        # Fails CI (exit 1) if any log call site passes a raw sensitive field
        # without going through a redact*() helper. See:
        # services/relayer/scripts/check-log-redaction.js
        run: node scripts/check-log-redaction.js
        working-directory: services/relayer

      - name: Run relayer tests (includes redaction unit tests)
        run: pnpm test
        working-directory: services/relayer

  # ── Issue #650: ai-agent Docker image build + smoke test ─────────────────
  ai-agent-docker:
    name: AI Agent — Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: quarantine-registry
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'services/ai-agent') ||
      true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ai-agent Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/ai-agent
          file: services/ai-agent/Dockerfile
          push: false
          load: true
          tags: ancore/ai-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        run: |
          # Start the container in detached mode
          docker run -d \
            --name ai-agent-smoke \
            -p 3001:3001 \
            -e NODE_ENV=production \
            ancore/ai-agent:ci

          # Wait for the healthcheck to pass (up to 30 s)
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ai-agent-smoke 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy."
              break
            fi
            sleep 2
          done

          # Verify /health returns HTTP 200
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
          echo "HTTP status from /health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test FAILED: expected 200, got $HTTP_CODE"
            docker logs ai-agent-smoke
            exit 1
          fi

          # Verify the response body contains status: ok
          BODY=$(curl -s http://localhost:3001/health)
          echo "Response body: $BODY"
          echo "$BODY" | grep -q '"status":"ok"' || (echo "Smoke test FAILED: missing status:ok in response" && exit 1)

          echo "Smoke test PASSED."

      - name: Dump container logs on failure
        if: failure()
        run: docker logs ai-agent-smoke || true

      - name: Stop and remove smoke container
        if: always()
        run: docker rm -f ai-agent-smoke || true

      - name: Verify container runs as non-root
        run: |
          USER_ID=$(docker run --rm --entrypoint id ancore/ai-agent:ci -u)
          echo "Container user ID: $USER_ID"
          if [ "$USER_ID" = "0" ]; then
            echo "FAIL: container is running as root (uid 0)"
            exit 1
          fi
          echo "PASS: container runs as non-root user (uid $USER_ID)"
